name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node 16
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write environment files
        run: |
          cat > src/environments/environment.ts << 'EOF'
          import { StoreProfile } from '../app/model/models';
          export var environment = {
            production: false,
            storeId: "77e2c029-3ea2-4a67-9722-603ff46d89e7",
            storeType: StoreProfile.StoreTypeEnum.FOOD,
            messengerId: "ffd4c856-644f-4453-a5ed-84689801a747",
            izingaUrl: "https://api.izinga.co.za",
            izingaPayUrl: "${{ secrets.IZINGA_PAY_URL }}",
            appVersion: "1.0.0",
            range: 0.09999,
            firebaseVapidKey: "${{ secrets.FIREBASE_VAPID_KEY }}",
            yocoPublicKey: "${{ secrets.YOCO_PUBLIC_KEY }}",
            firebase_apiKey: "${{ secrets.FIREBASE_API_KEY }}",
            authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            databaseURL: "${{ secrets.FIREBASE_DATABASE_URL }}",
            projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId: "${{ secrets.FIREBASE_APP_ID }}",
            measurementId: "${{ secrets.FIREBASE_MEASUREMENT_ID }}"
          };
          EOF

          cat > src/environments/environment.prod.ts << 'EOF'
          import { StoreProfile } from '../app/model/models';
          export const environment = {
            production: true,
            storeId: "77e2c029-3ea2-4a67-9722-603ff46d89e7",
            storeType: StoreProfile.StoreTypeEnum.FOOD,
            messengerId: "ffd4c856-644f-4453-a5ed-84689801a747",
            izingaUrl: "https://api.izinga.co.za",
            izingaPayUrl: "${{ secrets.IZINGA_PAY_URL }}",
            appVersion: "1.0.0",
            range: 0.09999,
            firebaseVapidKey: "${{ secrets.FIREBASE_VAPID_KEY }}",
            yocoPublicKey: "${{ secrets.YOCO_PUBLIC_KEY }}",
            firebase_apiKey: "${{ secrets.FIREBASE_API_KEY }}",
            authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            databaseURL: "${{ secrets.FIREBASE_DATABASE_URL }}",
            projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId: "${{ secrets.FIREBASE_APP_ID }}",
            measurementId: "${{ secrets.FIREBASE_MEASUREMENT_ID }}"
          };
          EOF

      - name: Build
        run: npm run build -- --configuration production
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Deploy to Firebase Hosting
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json npx firebase-tools deploy --only hosting:ingalabesi --project ijudi-d19bd
