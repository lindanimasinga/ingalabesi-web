<section class="menu-header home-shell">
  <h1 class="menu-title">{{shop?.name}} Menu</h1>
  <input
    #searchInput
    id="product-search"
    type="search"
    class="menu-search-input"
    placeholder="Search meals, wings, burgers, and more"
    (input)="shopItemsByName(searchInput.value)"
    aria-label="Search items by name"
  />
</section>

<section class="home-shell" *ngIf="searchItems?.length > 0">
  <div class="menu-grid">
    <div *ngFor="let item of searchItems" class="menu-grid-item">
      <app-shop-item [shop]="shop" [shopItem]="item"></app-shop-item>
    </div>
  </div>
</section>

<div class="search-empty-state home-shell" role="status" *ngIf="showNoSearchResults">
  <p class="search-empty-state__title">No items found for "{{searchTerm}}"</p>
  <p class="search-empty-state__text">Try a shorter search term or browse categories below.</p>
</div>

<section class="product-categories home-shell" aria-label="Menu categories" *ngIf="hasStockItems">
  <div *ngFor="let cat of categories; let catIndex = index" class="home-category-card mb-2">
    <button
      type="button"
      class="home-category-btn"
      [class.expanded]="isCategoryExpanded(cat)"
      (click)="toggleCategory(cat)"
      [attr.aria-expanded]="isCategoryExpanded(cat)">
      {{cat}}
      <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <polyline points="6 9 12 15 18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="category-items" *ngIf="isCategoryExpanded(cat)">
      <div class="menu-grid">
        <div *ngFor="let item of shopItems(cat)" class="menu-grid-item">
          <app-shop-item [shop]="shop" [shopItem]="item"></app-shop-item>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="home-shell" *ngIf="showNoStockItems">
  <div class="stock-empty-state" aria-live="polite">
    <h2 class="stock-empty-state__title">Menu items are coming soon</h2>
    <p class="stock-empty-state__text">We are updating this menu. Please check back shortly or contact us directly.</p>
  </div>
</section>
