<div class="">
<div class="mt-5 d-flex justify-content-sm-center justify-content-md-start">
    <div class="page-header h3">Checkout</div>
</div>

<!-- display total price and number of items -->
<div class="mt-3">
    <div class="h5">Total excl delivery: {{totalPrice() | currency:'R'}}</div>
    <div class="h5">Items: {{basket.items.length}}</div>
</div>

<div class="mt-4 row">
    <div class="col-12" *ngFor="let item of basket.items">
      <div class="basket-item-card">
        <img class="basket-item-image" [src]="item.image" [alt]="item.name" onerror="this.style.display='none'">
        <div class="basket-item-details">
          <div class="basket-item-name">{{item.name}}</div>
          <div class="basket-item-price">R{{item.price * item.quantity | number:'1.2-2'}}</div>
          <div class="basket-item-qty">Qty: {{item.quantity}}</div>
          <div *ngFor="let option of item.options" class="basket-item-qty">{{option.name}}: {{option.selected}}</div>
          <button class="basket-item-remove" type="button" (click)="remove(item)">Remove</button>
        </div>
      </div>
    </div>
</div>

    <a *ngIf="loggedId()" routerLink="../shipping">
        <button class="btn-continue">
        Continue ({{totalPrice() | currency:'R'}})
    </button></a>

    <a *ngIf="!loggedId()" routerLink="../login">
        <button class="btn-continue">
        Continue ({{totalPrice() | currency:'R'}})
    </button></a>
</div>
