<div class="login-page">

  <!-- Logo -->
  <div class="logo-block">
    <img src="assets/images/ingalabesi-logo.png" alt="Ingalabesi The Chicken King" class="logo-img" />
    <span class="logo-wordmark">INGALABESI</span>
    <span class="logo-subtitle">The Chicken King</span>
  </div>

  <p class="screen-heading">Verify your number</p>
  <p class="screen-body">We need to verify your cellphone number before we process your order. Please enter your number below.</p>

  <label class="field-label" for="cellphone">Cellphone Number</label>
  <div class="phone-row">
    <span class="phone-prefix">+27</span>
    <input id="cellphone" type="text" class="phone-field" [(ngModel)]="phoneNumber" name="mobileNumber"
      placeholder="815551234" required [disabled]="isVerificationRequested" />
  </div>

  <div class="recaptcha-wrapper">
    <div id="recaptcha-container" [style.visibility]="isVerificationRequested ? 'hidden' : 'visible'"></div>
  </div>

  <div *ngIf="hasError" class="error my-3">{{errorMessage}}</div>

  <div *ngIf="isVerificationRequested" class="mb-3">
    <p class="screen-body" style="margin-top: 16px;">We have sent a verification code via SMS. Please enter it below.</p>
    <label class="field-label" for="otp-code">Verification Code</label>
    <div class="phone-row">
      <input id="otp-code" type="text" class="phone-field" style="padding-left: 16px;" [(ngModel)]="code" name="code" placeholder="000000" required />
    </div>
    <div class="resend-row" (click)="resend()">Didn't receive a code? <a class="resend-link">Resend</a></div>
  </div>

  <button *ngIf="!isVerificationRequested" class="btn-primary" type="submit" (click)="verify()">Get Verification Code</button>
  <button *ngIf="isVerificationRequested" class="btn-primary" type="submit" (click)="confirmCode()">Confirm</button>

</div>
