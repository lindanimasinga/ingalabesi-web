<header class="brand-header">
  <div class="brand-header__inner">
    <div class="brand-header__logo-wrap">
      <img src="/assets/images/ingalabesi-logo.png" class="brand-header__logo" alt="Ingalabesi The Chicken King">
    </div>
    <a routerLink="cart" class="brand-header__cart-btn" aria-label="View cart">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="3" y1="6" x2="21" y2="6" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
        <path d="M16 10a4 4 0 01-8 0" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span *ngIf="hasItemsInCart()" class="brand-header__cart-badge">{{cartNumberOfItems}}</span>
    </a>
  </div>
</header>

<div *ngIf="shop" class="main-content-container">
    <router-outlet></router-outlet>
</div>

<div *ngIf="hasError" class="alert alert-danger error alert-dismissible fade show fixed-top" role="alert">
    <strong>{{errorMessage}}</strong>
    <button type="button" class="close" aria-label="Close" (click)="clearError()">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>

<nav class="bottom-tab-bar" aria-label="Main navigation">
  <a routerLink="/" routerLinkActive="tab-item--active" [routerLinkActiveOptions]="{exact:true}" class="tab-item tab-item--inactive">
    <svg class="tab-item__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M3 12L12 4L21 12V20C21 20.55 20.55 21 20 21H15V16H9V21H4C3.45 21 3 20.55 3 20V12Z" stroke="currentColor" stroke-width="2" fill="currentColor"/>
    </svg>
    <span class="tab-item__label">Home</span>
  </a>
  <a routerLink="/home/cart" routerLinkActive="tab-item--active" class="tab-item tab-item--inactive">
    <svg class="tab-item__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="9" cy="21" r="1" stroke="currentColor" stroke-width="2"/>
      <circle cx="20" cy="21" r="1" stroke="currentColor" stroke-width="2"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.98-1.73L23 6H6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="tab-item__label">Cart</span>
  </a>
  <a routerLink="/home/orders" routerLinkActive="tab-item--active" class="tab-item tab-item--inactive">
    <svg class="tab-item__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
      <path d="M4 20C4 17 7.58 15 12 15C16.42 15 20 17 20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span class="tab-item__label">Profile</span>
  </a>
</nav>
