<div class="landing-wrapper">

  <!-- HERO -->
  <section class="landing-hero">
    <img
      class="landing-hero__image"
      src="assets/images/ingalabesi-hero.jpg"
      alt="Ingalabesi The Chicken King — authentic grilled chicken"
    />
    <div class="landing-hero__logo">
      <img
        class="landing-hero__icon"
        src="assets/images/ingalabesi-logo.png"
        alt="Ingalabesi logo"
      />
    </div>
  </section>

  <!-- ACTIONS -->
  <div class="landing-actions">
    <button
      class="btn-pill btn-pill--book"
      type="button"
      (click)="bookEvent()"
      aria-label="Book an event via WhatsApp"
    >
      <svg class="btn-pill__icon" viewBox="0 0 22 22" fill="none" aria-hidden="true">
        <rect x="3" y="5" width="16" height="14" rx="2" stroke="white" stroke-width="2"/>
        <line x1="7" y1="3" x2="7" y2="7" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="15" y1="3" x2="15" y2="7" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="3" y1="10" x2="19" y2="10" stroke="white" stroke-width="2"/>
        <path d="M8 14.5 L10 16.5 L14 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Book an Event
    </button>

    <button
      class="btn-pill btn-pill--order"
      type="button"
      (click)="orderNow()"
      aria-label="Order now — browse the menu"
    >
      <svg class="btn-pill__icon" viewBox="0 0 22 22" fill="none" aria-hidden="true">
        <rect x="4" y="3" width="14" height="16" rx="2" stroke="white" stroke-width="2"/>
        <line x1="7" y1="8" x2="15" y2="8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="7" y1="11" x2="15" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="7" y1="14" x2="11" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Order Now
    </button>

    <p class="landing-contact">CONTACT: 061 700 2915</p>
  </div>

  <!-- BOTTOM TAB BAR -->
  <nav class="bottom-tab-bar" aria-label="Main navigation">
    <div class="tab-item tab-item--active">
      <svg class="tab-item__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M3 12L12 4L21 12V20C21 20.55 20.55 21 20 21H15V16H9V21H4C3.45 21 3 20.55 3 20V12Z" fill="#E67B26"/>
      </svg>
      <span class="tab-item__label">Home</span>
    </div>
    <div class="tab-item tab-item--inactive" (click)="orderNow()" role="button" aria-label="Menu">
      <svg class="tab-item__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <line x1="3" y1="6" x2="21" y2="6" stroke="#AAAAAA" stroke-width="2" stroke-linecap="round"/>
        <line x1="3" y1="12" x2="21" y2="12" stroke="#AAAAAA" stroke-width="2" stroke-linecap="round"/>
        <line x1="3" y1="18" x2="21" y2="18" stroke="#AAAAAA" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="tab-item__label">Menu</span>
    </div>
    <div class="tab-item tab-item--inactive" role="button" aria-label="Profile">
      <svg class="tab-item__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="8" r="4" stroke="#AAAAAA" stroke-width="2"/>
        <path d="M4 20C4 17 7.58 15 12 15C16.42 15 20 17 20 20" stroke="#AAAAAA" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="tab-item__label">Profile</span>
    </div>
  </nav>

</div>
